openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Lumina HQ API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: settings
    description: App settings
  - name: zoho
    description: Zoho Mail OAuth and sync
  - name: threads
    description: Email threads
  - name: rfq
    description: RFQ Pipeline
  - name: ai
    description: AI features
  - name: suppliers
    description: Supplier database
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get all app settings (sensitive values masked)
      responses:
        "200":
          description: Settings map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsResponse"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Save settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /auth/zoho/connect:
    get:
      operationId: getZohoAuthUrl
      tags: [zoho]
      summary: Get Zoho OAuth authorization URL
      parameters:
        - in: query
          name: label
          schema:
            type: string
          description: Account label (Owner, Sales, Procurement, etc.)
      responses:
        "200":
          description: Auth URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZohoAuthUrl"

  /auth/zoho/status:
    get:
      operationId: getZohoStatus
      tags: [zoho]
      summary: Get Zoho connection status (primary account)
      responses:
        "200":
          description: Connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZohoStatus"

  /auth/zoho/accounts:
    get:
      operationId: getZohoAccounts
      tags: [zoho]
      summary: List all connected Zoho accounts
      responses:
        "200":
          description: List of connected accounts
          content:
            application/json:
              schema:
                type: object
                required: [accounts]
                properties:
                  accounts:
                    type: array
                    items:
                      $ref: "#/components/schemas/ZohoAccount"

  /auth/zoho/accounts/{id}:
    patch:
      operationId: updateZohoAccountLabel
      tags: [zoho]
      summary: Update the role label of a connected Zoho account
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ZohoAccountLabelUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
    delete:
      operationId: disconnectZohoAccount
      tags: [zoho]
      summary: Disconnect a specific Zoho account
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /auth/zoho/disconnect:
    delete:
      operationId: disconnectZoho
      tags: [zoho]
      summary: Disconnect all Zoho accounts
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /sync/run:
    post:
      operationId: runSync
      tags: [zoho]
      summary: Trigger Zoho inbox sync and AI triage for ALL accounts
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"

  /sync/run/{id}:
    post:
      operationId: runSyncForAccount
      tags: [zoho]
      summary: Sync a single Zoho account by connection id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"

  /sync/status:
    get:
      operationId: getSyncStatus
      tags: [zoho]
      summary: Get last sync time and connection status
      responses:
        "200":
          description: Sync status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatus"

  /threads:
    get:
      operationId: getThreads
      tags: [threads]
      summary: Get all synced email threads
      parameters:
        - in: query
          name: classification
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: accountId
          schema:
            type: string
          description: Filter threads by Zoho accountId
      responses:
        "200":
          description: Thread list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreadsResponse"

  /threads/counts:
    get:
      operationId: getThreadCounts
      tags: [threads]
      summary: Get thread counts grouped by Zoho accountId
      responses:
        "200":
          description: Thread counts per account
          content:
            application/json:
              schema:
                type: object
                required: [counts, total]
                properties:
                  total:
                    type: integer
                  counts:
                    type: object
                    additionalProperties:
                      type: integer

  /threads/{id}/attachments/{attId}:
    get:
      operationId: downloadThreadAttachment
      tags: [threads]
      summary: Download an attachment binary from Zoho via the server proxy
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: attId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Attachment binary stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /threads/{id}/conversation:
    get:
      operationId: getThreadConversation
      tags: [threads]
      summary: Fetch all messages in the same conversation from Zoho (across folders)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Conversation messages, sorted oldest → newest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationResponse"

  /threads/{id}/full:
    get:
      operationId: getThreadFull
      tags: [threads]
      summary: Fetch full email body (HTML) + attachments from Zoho; marks as read
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Full email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FullEmailResponse"

  /threads/{id}/mark-read:
    post:
      operationId: markThreadRead
      tags: [threads]
      summary: Mark email as read or unread (Zoho + local)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkReadInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                required: [ok, isRead]
                properties:
                  ok: { type: boolean }
                  isRead: { type: boolean }

  /threads/{id}/archive:
    post:
      operationId: archiveThread
      tags: [threads]
      summary: Move email to Archive folder in Zoho and remove from inbox
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Archived
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }

  /threads/{id}/summarize:
    post:
      operationId: summarizeThread
      tags: [threads]
      summary: AI summary of the email (Claude)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailSummary"

  /threads/{id}/draft-reply:
    post:
      operationId: draftReplyForThread
      tags: [threads]
      summary: AI-drafted reply for the email (Claude)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailDraftReply"

  /threads/{id}/send:
    post:
      operationId: sendThreadReply
      tags: [threads]
      summary: Send a reply via Zoho Mail
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendEmailInput"
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }

  /threads/{id}/create-rfq:
    post:
      operationId: createRfqFromThread
      tags: [threads]
      summary: Create an rfq_record from an email thread (idempotent)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: RFQ created or already existed
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
                  rfqId:
                    type: integer
                  created:
                    type: boolean

  /threads/backfill-rfqs:
    post:
      operationId: backfillRfqsFromThreads
      tags: [threads]
      summary: Create rfq_records for all RFQ-classified threads missing one
      responses:
        "200":
          description: Backfill result
          content:
            application/json:
              schema:
                type: object
                required: [ok, created, scanned]
                properties:
                  ok:
                    type: boolean
                  created:
                    type: integer
                  scanned:
                    type: integer

  /threads/{id}:
    get:
      operationId: getThread
      tags: [threads]
      summary: Get single thread
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreadResponse"
    delete:
      operationId: deleteThread
      tags: [threads]
      summary: Move email to Trash in Zoho and remove from inbox
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }

  /rfq:
    get:
      operationId: getRfqs
      tags: [rfq]
      summary: Get all RFQs grouped by stage with metrics
      responses:
        "200":
          description: RFQ pipeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RfqPipelineResponse"
    post:
      operationId: createRfq
      tags: [rfq]
      summary: Create a new RFQ manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RfqInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RfqRecordResponse"

  /rfq/{id}:
    get:
      operationId: getRfq
      tags: [rfq]
      summary: Get single RFQ with products, quotes, and thread
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: RFQ detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RfqDetailResponse"
    patch:
      operationId: updateRfq
      tags: [rfq]
      summary: Update RFQ notes or estimated value
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RfqUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RfqRecordResponse"

  /rfq/{id}/stage:
    patch:
      operationId: updateRfqStage
      tags: [rfq]
      summary: Move RFQ to a new stage
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StageUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RfqRecordResponse"

  /rfq/{id}/confirm-extraction:
    post:
      operationId: confirmExtraction
      tags: [rfq]
      summary: Confirm reviewed product extraction and advance to SOURCING
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractionConfirmInput"
      responses:
        "200":
          description: Confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionConfirmResponse"

  /rfq/{id}/quotes:
    get:
      operationId: getRfqQuotes
      tags: [rfq]
      summary: Get all supplier quotes for an RFQ
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quotes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotesResponse"
    post:
      operationId: logSupplierQuote
      tags: [rfq]
      summary: Log a supplier quote and move to COMPARING
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierQuoteInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteCreatedResponse"

  /rfq/{id}/suggested-suppliers:
    get:
      operationId: getSuggestedSuppliers
      tags: [rfq]
      summary: Get suggested suppliers based on RFQ product categories
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Suggested suppliers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestedSuppliersResponse"

  /rfq/{id}/customer-quotes:
    get:
      operationId: getCustomerQuotes
      tags: [rfq]
      summary: Get all customer quote versions for an RFQ
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer quotes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerQuotesResponse"

  /rfq/{id}/customer-quotes/{quoteId}/revise:
    post:
      operationId: reviseCustomerQuote
      tags: [rfq]
      summary: Create a revised version of a customer quote
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: quoteId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteRevisionInput"
      responses:
        "201":
          description: New revision created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerQuoteRevisionResponse"

  /rfq/{id}/extract-products:
    post:
      operationId: extractProducts
      tags: [ai]
      summary: AI-extract product list from email body or attachments
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Extracted products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductsResponse"

  /rfq/{id}/parse-supplier-reply:
    post:
      operationId: parseSupplierReply
      tags: [ai]
      summary: AI-parse pasted supplier reply email to pre-fill quote form
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParseSupplierReplyInput"
      responses:
        "200":
          description: Parsed quote data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParsedSupplierReplyResponse"

  /rfq/{id}/draft-supplier:
    post:
      operationId: draftSupplierEmail
      tags: [ai]
      summary: AI-generate supplier inquiry email draft
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Draft content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftResponse"

  /rfq/{id}/draft-customer:
    post:
      operationId: draftCustomerQuote
      tags: [ai]
      summary: AI-generate customer quotation email draft
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerQuoteParams"
      responses:
        "200":
          description: Draft content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftResponse"

  /rfq/{id}/draft-followup:
    post:
      operationId: draftFollowup
      tags: [ai]
      summary: AI-generate follow-up email draft
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Draft content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowupDraftResponse"

  /rfq/{id}/supplier-contacts:
    get:
      operationId: listSupplierContacts
      tags: [rfq]
      summary: List supplier contacts for an RFQ
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contacts list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkSupplierContactsResponse"
    post:
      operationId: bulkCreateSupplierContacts
      tags: [rfq]
      summary: Record a batch of supplier outreach contacts
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkSupplierContactsInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkSupplierContactsResponse"

  /rfq/{id}/supplier-contacts/{contactId}:
    patch:
      operationId: updateSupplierContactStatus
      tags: [rfq]
      summary: Mark a supplier contact as responded / no_response / declined / partial
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: contactId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierContactStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierContactResponse"

  /rfq/{id}/find-suppliers-online:
    post:
      operationId: findSuppliersOnline
      tags: [ai]
      summary: Use Perplexity to find suppliers online for this RFQ
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FindSuppliersOnlineInput"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FindSuppliersResult"

  /ai/summarize-supplier-website:
    post:
      operationId: summarizeSupplierWebsite
      tags: [ai]
      summary: Summarise a supplier website via Perplexity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SummarizeSupplierWebsiteInput"
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebsiteSummaryResult"

  /rfq/{id}/draft-supplier-followup:
    post:
      operationId: draftSupplierFollowup
      tags: [ai]
      summary: AI-draft a supplier follow-up message for a specific contact
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierFollowupInput"
      responses:
        "200":
          description: Draft content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftResponse"

  /rfq/{id}/compare:
    get:
      operationId: compareSupplierQuotes
      tags: [ai]
      summary: Get supplier comparison table with landed cost and AI recommendation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comparison data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComparisonResponse"

  /ai/reclassify-all:
    post:
      operationId: reclassifyAll
      tags: [ai]
      summary: Re-classify all stored email threads using AI triage
      responses:
        "200":
          description: Reclassification result
          content:
            application/json:
              schema:
                type: object
                required: [ok, total, processed, failed, counts]
                properties:
                  ok:
                    type: boolean
                  total:
                    type: integer
                  processed:
                    type: integer
                  failed:
                    type: integer
                  counts:
                    type: object
                    additionalProperties:
                      type: integer

  /ai/drafts/{draftId}/copied:
    patch:
      operationId: markDraftCopied
      tags: [ai]
      summary: Mark a draft as copied to clipboard
      parameters:
        - in: path
          name: draftId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /suppliers:
    get:
      operationId: getSuppliers
      tags: [suppliers]
      summary: List all active suppliers
      parameters:
        - in: query
          name: includeInactive
          schema:
            type: boolean
        - in: query
          name: category
          schema:
            type: string
      responses:
        "200":
          description: Suppliers list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuppliersResponse"
    post:
      operationId: createSupplier
      tags: [suppliers]
      summary: Create a new supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierDetailResponse"

  /suppliers/{id}:
    get:
      operationId: getSupplier
      tags: [suppliers]
      summary: Get a supplier with categories
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierDetailResponse"
    patch:
      operationId: updateSupplier
      tags: [suppliers]
      summary: Update a supplier
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierUpdateInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierDetailResponse"
    delete:
      operationId: deactivateSupplier
      tags: [suppliers]
      summary: Deactivate a supplier
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /suppliers/{id}/categories:
    post:
      operationId: addSupplierCategory
      tags: [suppliers]
      summary: Add a product category to a supplier
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierCategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierCategoryResponse"

  /suppliers/{id}/categories/{catId}:
    delete:
      operationId: removeSupplierCategory
      tags: [suppliers]
      summary: Remove a category from a supplier
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: catId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /suppliers/{id}/performance:
    get:
      operationId: getSupplierPerformance
      tags: [suppliers]
      summary: Get supplier performance metrics
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Performance data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierPerformanceResponse"

components:
